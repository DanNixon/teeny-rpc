version: 2

updates:
  - package-ecosystem: github-actions
    directory: "."
    schedule:
      interval: semiannually

  - package-ecosystem: cargo
    directory: "."
    schedule:
      interval: semiannually
    groups:
      cargo-dependencies:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: "./examples/pc"
    schedule:
      interval: semiannually
    groups:
      cargo-dependencies:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: "./examples/pi-pico"
    schedule:
      interval: semiannually
    groups:
      cargo-dependencies:
        patterns:
          - "*"
