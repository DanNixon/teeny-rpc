---
name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  library:
    name: Library
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Clippy
        run: |
          set -x
          nix develop --command cargo clippy -- -Dwarnings
          nix develop --command cargo clippy --no-default-features -F no-std -- -Dwarnings

      - name: Tests
        run: |
          set -x
          nix develop --command cargo test

      - name: Build
        run: |
          set -x
          nix develop --command cargo build
          nix develop --command cargo build --no-default-features -F no-std

  example-pc:
    name: PC example
    runs-on: ubuntu-latest
    needs:
      - library

    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Build
        run: |
          set -x
          cd ./examples/pc
          nix develop --command cargo build --release

  example-pi-pico:
    name: Pi Pico example
    runs-on: ubuntu-latest
    needs:
      - library

    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Build
        run: |
          set -x
          cd ./examples/pi-pico
          nix develop --command rustup target add thumbv6m-none-eabi
          nix develop --command cargo build --release
